name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Locate wrangler config
        id: locate
        run: |
          echo "--- repo root ---"
          ls -la
          echo "--- dist tree (3 levels) ---"
          find dist -maxdepth 3 -print 2>/dev/null || echo "no dist/"
          echo "--- searching for wrangler.json* anywhere ---"
          FOUND=$(find . -path ./node_modules -prune -o -type f \( -name 'wrangler.json' -o -name 'wrangler.jsonc' -o -name 'wrangler.toml' \) -print 2>/dev/null | grep -v node_modules | head -20)
          echo "$FOUND"
          CFG=$(echo "$FOUND" | grep -E '(dist|\.output|build)/' | head -1)
          if [ -z "$CFG" ]; then CFG=$(echo "$FOUND" | head -1); fi
          echo "Selected config: $CFG"
          echo "config=$CFG" >> $GITHUB_OUTPUT
          echo "dir=$(dirname "$CFG")" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare
        working-directory: ${{ steps.locate.outputs.dir }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy --name compassion-connect

