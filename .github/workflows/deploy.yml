name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare Cloudflare deploy config
        run: |
          test -f dist/server/index.mjs
          test -d dist/client
          cat > dist/server/wrangler.json <<'EOF'
          {
            "name": "compassion-connect",
            "compatibility_date": "2025-09-24",
            "compatibility_flags": ["nodejs_compat"],
            "main": "index.mjs",
            "assets": {
              "binding": "ASSETS",
              "directory": "../client"
            },
            "no_bundle": true,
            "rules": [
              {
                "type": "ESModule",
                "globs": ["**/*.mjs", "**/*.js"]
              }
            ]
          }
          EOF
          cat dist/server/wrangler.json

      - name: Deploy to Cloudflare
        working-directory: ./dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy -c wrangler.json --name compassion-connect

